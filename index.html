<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wealth Manager</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="WealthManager-Icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>
<body class="bg-slate-950 text-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, Fragment } = React;

    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBTu0KY7ggU-idoBQUaqqAp1Lu-ikCmH14",
      authDomain: "wealth-manager-50994.firebaseapp.com",
      projectId: "wealth-manager-50994",
      storageBucket: "wealth-manager-50994.firebasestorage.app",
      messagingSenderId: "1030190749268",
      appId: "1:1030190749268:web:f689215d30ed4bbc4a3fc1"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    const PROJECT_APP_ID = 'wealth-manager-50994';

    db.enablePersistence().catch((err) => console.log("Firebase Offline Error:", err.code));
    const getUserPath = (uid, colName) => db.collection('artifacts').doc(PROJECT_APP_ID).collection('users').doc(uid).collection(colName);

    // --- ICONS & LOGOS ---
    const Icon = ({ name, size, className = '' }) => <i className={`fa-solid ${name} ${className}`} style={{ fontSize: size ? `${size}px` : undefined }}></i>;

    const CustomLogo = ({ className }) => (
      <svg viewBox="0 0 100 100" className={className} xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="#0A2E13" />
        <path d="M 8 32 a 8 8 0 0 1 8 -8 h 10 v -10 a 8 8 0 0 1 8 -8 h 32 a 8 8 0 0 1 8 8 v 10 h 10 a 8 8 0 0 1 8 8 v 52 a 8 8 0 0 1 -8 8 h -76 a 8 8 0 0 1 -8 -8 z" fill="#339C32" />
        <rect x="32" y="14" width="36" height="12" rx="4" fill="#0A2E13" />
        <rect x="16" y="36" width="18" height="48" rx="4" fill="#0A2E13" />
        <rect x="41" y="36" width="18" height="48" rx="4" fill="#0A2E13" />
        <rect x="66" y="36" width="18" height="48" rx="4" fill="#0A2E13" />
      </svg>
    );

    const GoogleIcon = () => (
      <svg className="w-5 h-5 mr-3" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>
    );

    const ASSET_CATEGORIES = {
      CRYPTO: { name: 'Cryptocurrency', icon: 'fa-coins', color: '#f59e0b', hasUnits: true, unitName: 'Coins' },
      IN_STOCK: { name: 'Indian Stocks', icon: 'fa-arrow-trend-up', color: '#f97316', hasUnits: true, unitName: 'Shares' },
      US_STOCK: { name: 'US Stocks', icon: 'fa-globe', color: '#3b82f6', hasUnits: true, unitName: 'Shares' },
      MF_LARGE: { name: 'MF - Large Cap', icon: 'fa-chart-pie', color: '#8b5cf6', hasUnits: false },
      MF_MID: { name: 'MF - Mid Cap', icon: 'fa-chart-pie', color: '#d946ef', hasUnits: false },
      MF_SMALL: { name: 'MF - Small Cap', icon: 'fa-chart-pie', color: '#ec4899', hasUnits: false },
      REAL_ESTATE: { name: 'Real Estate', icon: 'fa-house', color: '#10b981', hasUnits: false },
      COMMODITY: { name: 'Commodities', icon: 'fa-gem', color: '#eab308', hasUnits: true, unitName: 'Units' },
      BOND: { name: 'Bonds', icon: 'fa-landmark', color: '#64748b', hasUnits: false },
      FD: { name: 'Fixed Deposits', icon: 'fa-shield-halved', color: '#0ea5e9', hasUnits: false },
      PPF: { name: 'PPF', icon: 'fa-piggy-bank', color: '#14b8a6', hasUnits: false },
      NPS: { name: 'NPS', icon: 'fa-building-columns', color: '#8b5cf6', hasUnits: false },
      SSY: { name: 'Sukanya Samriddhi', icon: 'fa-child', color: '#ec4899', hasUnits: false },
      OTHER: { name: 'Other', icon: 'fa-box-open', color: '#94a3b8', hasUnits: false }
    };

    const LIABILITY_CATEGORIES = {
      HOME_LOAN: { name: 'Home Loan', icon: 'fa-house', color: '#ec4899' },
      AUTO_LOAN: { name: 'Auto/Car Loan', icon: 'fa-car', color: '#8b5cf6' },
      PERSONAL_LOAN: { name: 'Personal Loan', icon: 'fa-file-lines', color: '#f59e0b' },
      CREDIT_CARD: { name: 'Credit Card Debt', icon: 'fa-credit-card', color: '#ef4444' }
    };

    const EXPENSE_TYPES = {
      NEED: { name: 'Needs (50%)', color: '#3b82f6', bg: 'bg-blue-500', categories: ['Groceries', 'Rent/Mortgage', 'Utilities', 'Insurance', 'Transport', 'Healthcare', 'Debt EMI'] },
      WANT: { name: 'Wants (30%)', color: '#ec4899', bg: 'bg-pink-500', categories: ['Dining Out', 'Entertainment', 'Shopping', 'Travel', 'Hobbies', 'Subscriptions'] },
      INVESTMENT: { name: 'Investments (20%)', color: '#10b981', bg: 'bg-emerald-500', categories: ['Stocks', 'Mutual Funds', 'Crypto', 'FD/RD', 'PPF/NPS', 'Savings'] }
    };

    const formatINR = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);
    const formatPercent = (val) => `${val > 0 ? '+' : ''}${val.toFixed(2)}%`;
    const formatDate = (dateString) => dateString ? new Date(dateString).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

    // --- PIE CHART COMPONENT ---
    const DonutChart = ({ data, title, totalLabel }) => {
      const total = data.reduce((sum, item) => sum + item.value, 0);
      if (total === 0) return <div className="text-center text-slate-500 py-10 bg-slate-950/30 rounded-xl border border-slate-800/50"><Icon name="fa-chart-pie" size={24} className="mb-2 opacity-50"/><p className="text-sm">No {title.toLowerCase()} this month</p></div>;

      let cumulativePercent = 0;
      const segments = data.map((item, index) => {
        const percent = (item.value / total) * 100;
        const dashArray = `${percent} ${100 - percent}`;
        const dashOffset = -cumulativePercent;
        cumulativePercent += percent;
        return <circle key={index} r="15.91549430918954" cx="21" cy="21" fill="transparent" stroke={item.color} strokeWidth="5" strokeDasharray={dashArray} strokeDashoffset={dashOffset} className="transition-all duration-1000 ease-out" />;
      });

      return (
        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-sm flex flex-col items-center">
          <h3 className="text-sm font-bold text-slate-300 w-full text-left mb-4">{title}</h3>
          <div className="relative w-32 h-32 md:w-40 md:h-40 mb-4">
            <svg viewBox="0 0 42 42" className="w-full h-full rounded-full" style={{ transform: 'rotate(-90deg)' }}>
              <circle r="15.91549430918954" cx="21" cy="21" fill="transparent" stroke="#1e293b" strokeWidth="5" />
              {segments}
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
              <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider">{totalLabel}</span>
              <span className="text-sm font-black text-white">{formatINR(total)}</span>
            </div>
          </div>
          <div className="w-full space-y-2.5 max-h-[150px] overflow-y-auto custom-scrollbar pr-1">
            {data.map((item, i) => (
              <div key={i} className="flex justify-between items-center text-xs">
                <div className="flex items-center truncate mr-2"><div className="w-2.5 h-2.5 rounded-full mr-2 shrink-0" style={{backgroundColor: item.color}}></div><span className="text-slate-300 truncate">{item.label}</span></div>
                <div className="text-right shrink-0"><span className="font-bold text-white mr-2">{formatINR(item.value)}</span><span className="text-slate-500 w-8 inline-block">{((item.value / total) * 100).toFixed(0)}%</span></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const getTodayDate = () => new Date().toISOString().split('T')[0];
      
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authMode, setAuthMode] = useState('login'); 
      const [authForm, setAuthForm] = useState({ name: '', email: '', password: '' });
      const [authError, setAuthError] = useState('');

      const [customPassword, setCustomPassword] = useState(''); 
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState(false);
      const [isAppLocked, setIsAppLocked] = useState(false);
      
      const [activeTab, setActiveTab] = useState('wealth'); 
      const [selectedMonth, setSelectedMonth] = useState(getTodayDate().slice(0, 7)); 

      const [transactions, setTransactions] = useState([]); 
      const [holdings, setHoldings] = useState([]); 
      const [liabilities, setLiabilities] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [incomeSources, setIncomeSources] = useState(['Primary Salary', 'Business Income', 'Freelance Work', 'Rental Income']);

      // Modals
      const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
      const [passwordChangeData, setPasswordChangeData] = useState({ current: '', new: '', confirm: '' });
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isTransactionModalOpen, setIsTransactionModalOpen] = useState(false);
      const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
      const [isLiabilityModalOpen, setIsLiabilityModalOpen] = useState(false);
      const [isYieldModalOpen, setIsYieldModalOpen] = useState(false);
      const [isPayEmiModalOpen, setIsPayEmiModalOpen] = useState(false);
      const [sellModalData, setSellModalData] = useState(null);
      
      const [expandedCategories, setExpandedCategories] = useState(Object.keys(ASSET_CATEGORIES).reduce((acc, key) => ({ ...acc, [key]: true }), {}));
      const [expandedAssets, setExpandedAssets] = useState({});

      const [editingAssetId, setEditingAssetId] = useState(null);
      const [editingTransactionId, setEditingTransactionId] = useState(null);
      const [editingLiabilityId, setEditingLiabilityId] = useState(null);
      const [editingExpenseId, setEditingExpenseId] = useState(null);

      // Forms
      const [newAsset, setNewAsset] = useState({ category: 'IN_STOCK', name: '', invested: '', buyPrice: '', currentPrice: '', manualCurrentValue: '', date: getTodayDate() });
      const [newTransaction, setNewTransaction] = useState({ type: 'INCOME', source: 'Primary Salary', customSource: '', amount: '', date: getTodayDate() });
      const [newExpense, setNewExpense] = useState({ type: 'NEED', category: 'Groceries', amount: '', date: getTodayDate(), note: '' });
      const [newLiability, setNewLiability] = useState({ category: 'PERSONAL_LOAN', name: '', totalAmount: '', paidAmount: '', monthlyEmi: '', date: getTodayDate() });
      const [yieldData, setYieldData] = useState({ assetId: null, assetName: '', amount: '', date: getTodayDate() });
      const [emiData, setEmiData] = useState({ liabilityId: null, name: '', amount: '', date: getTodayDate() });

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((currentUser) => { setUser(currentUser); setAuthLoading(false); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) { setHoldings([]); setTransactions([]); setLiabilities([]); setExpenses([]); return; }
        const unsubHoldings = getUserPath(user.uid, 'holdings').onSnapshot(snap => setHoldings(snap.docs.map(doc => doc.data())));
        const unsubTx = getUserPath(user.uid, 'transactions').onSnapshot(snap => setTransactions(snap.docs.map(doc => doc.data())));
        const unsubLiab = getUserPath(user.uid, 'liabilities').onSnapshot(snap => setLiabilities(snap.docs.map(doc => doc.data())));
        const unsubExp = getUserPath(user.uid, 'daily_expenses').onSnapshot(snap => setExpenses(snap.docs.map(doc => doc.data())));
        const unsubSettings = db.collection('artifacts').doc(PROJECT_APP_ID).collection('users').doc(user.uid).collection('settings').doc('profile').onSnapshot(docSnap => {
            if (docSnap.exists && docSnap.data().incomeSources) setIncomeSources(docSnap.data().incomeSources);
        });
        return () => { unsubHoldings(); unsubTx(); unsubLiab(); unsubExp(); unsubSettings(); };
      }, [user]);

      const handleAuthSubmit = async (e) => {
        e.preventDefault(); setAuthError('');
        try {
          if (authMode === 'signup') {
            const userCred = await auth.createUserWithEmailAndPassword(authForm.email, authForm.password);
            await userCred.user.updateProfile({ displayName: authForm.name });
            setUser({ ...userCred.user, displayName: authForm.name });
          } else { await auth.signInWithEmailAndPassword(authForm.email, authForm.password); }
        } catch (err) { setAuthError(err.message.replace('Firebase: ', '')); }
      };

      const handleGoogleAuth = async () => {
        try { await auth.signInWithPopup(googleProvider); } catch (err) { setAuthError(err.message.replace('Firebase: ', '')); }
      };

      const handleResetPassword = async () => {
        if (!authForm.email) return setAuthError('Enter your email above to reset password.');
        try { await auth.sendPasswordResetEmail(authForm.email); alert('Reset link sent!'); setAuthError(''); } 
        catch (err) { setAuthError(err.message.replace('Firebase: ', '')); }
      };

      const handleAppLogin = (e) => {
        e.preventDefault();
        if (passwordInput === customPassword) { setIsAppLocked(false); setPasswordError(false); setPasswordInput(''); } 
        else { setPasswordError(true); setPasswordInput(''); }
      };

      const handleSetOrChangePassword = (e) => {
        e.preventDefault();
        if (customPassword && passwordChangeData.current !== customPassword) return alert('Current PIN incorrect');
        if (passwordChangeData.new !== passwordChangeData.confirm) return alert('PINs do not match');
        setCustomPassword(passwordChangeData.new); setIsSettingsModalOpen(false); setPasswordChangeData({ current: '', new: '', confirm: '' });
      };

      // --- CALCULATIONS ---
      const transactionStats = useMemo(() => {
        let totalIncome = 0; let totalWithdrawal = 0;
        transactions.forEach(t => { if (t.type === 'INCOME') totalIncome += t.amount; else totalWithdrawal += t.amount; });
        return { totalIncome, totalWithdrawal, netCashFlow: totalIncome - totalWithdrawal };
      }, [transactions]);

      const liabilityStats = useMemo(() => {
        let totalBorrowed = 0; let totalPaid = 0; let totalMonthlyEmi = 0;
        liabilities.forEach(l => { totalBorrowed += l.totalAmount; totalPaid += l.paidAmount; totalMonthlyEmi += l.monthlyEmi; });
        return { totalBorrowed, totalPaid, totalRemaining: totalBorrowed - totalPaid, totalMonthlyEmi };
      }, [liabilities]);

      const formCalculations = useMemo(() => {
        const isTracked = ASSET_CATEGORIES[newAsset.category]?.hasUnits;
        const invested = parseFloat(newAsset.invested) || 0;
        if (isTracked) {
          const buyP = parseFloat(newAsset.buyPrice) || 0; const curP = parseFloat(newAsset.currentPrice) || 0;
          return { quantity: buyP > 0 ? invested / buyP : 0, currentValue: (buyP > 0 ? invested / buyP : 0) * curP, currentPrice: curP };
        } else return { quantity: 0, currentValue: parseFloat(newAsset.manualCurrentValue) || invested, currentPrice: null };
      }, [newAsset]);

      const portfolioStats = useMemo(() => {
        let totalInvested = 0; let totalCurrent = 0; let totalYieldEarned = 0; const categoryTotals = {};
        const enrichedHoldings = holdings.map(asset => {
          let currentVal = asset.current; 
          totalInvested += asset.invested; totalCurrent += currentVal; totalYieldEarned += (asset.yieldEarned || 0);
          if (!categoryTotals[asset.category]) categoryTotals[asset.category] = { invested: 0, current: 0, yield: 0 };
          categoryTotals[asset.category].invested += asset.invested; categoryTotals[asset.category].current += currentVal; categoryTotals[asset.category].yield += (asset.yieldEarned || 0);
          return { ...asset, computedCurrent: currentVal };
        });
        const capitalGain = totalCurrent - totalInvested;
        const totalReturn = capitalGain + totalYieldEarned;
        const allocation = Object.keys(categoryTotals).map(catKey => {
          const cat = categoryTotals[catKey]; const catTotalReturn = (cat.current - cat.invested) + cat.yield;
          return { key: catKey, ...ASSET_CATEGORIES[catKey], invested: cat.invested, current: cat.current, totalReturn: catTotalReturn, returnPercent: cat.invested > 0 ? (catTotalReturn / cat.invested) * 100 : 0, percentage: totalCurrent > 0 ? (cat.current / totalCurrent) * 100 : 0 };
        }).sort((a, b) => b.current - a.current);
        return { totalInvested, totalCurrent, capitalGain, totalYieldEarned, totalReturn, allocation, enrichedHoldings };
      }, [holdings]);

      const groupedHoldingsByAsset = useMemo(() => {
        const groups = {};
        portfolioStats.enrichedHoldings.forEach(asset => {
          if (!groups[asset.category]) groups[asset.category] = {};
          if (!groups[asset.category][asset.name]) groups[asset.category][asset.name] = { name: asset.name, category: asset.category, totalQuantity: 0, totalInvested: 0, totalCurrent: 0, totalYield: 0, lots: [] };
          const group = groups[asset.category][asset.name];
          group.totalQuantity += (asset.quantity || 0); group.totalInvested += asset.invested; group.totalCurrent += asset.computedCurrent; group.totalYield += (asset.yieldEarned || 0);
          group.lots.push(asset);
        });
        Object.values(groups).forEach(cat => { Object.values(cat).forEach(assetGrp => { assetGrp.lots.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)); }); });
        return groups;
      }, [portfolioStats.enrichedHoldings]);

      // --- CRASH-PROOF BUDGET CALCULATIONS ---
      const budgetStats = useMemo(() => {
        // Safe string matching - ignores any old transactions that don't have a date property
        const monthTx = transactions.filter(t => t.date && t.date.startsWith(selectedMonth));
        const monthExp = expenses.filter(e => e.date && e.date.startsWith(selectedMonth));

        let totalIncome = 0; const incomeBySource = {};
        monthTx.filter(t => t.type === 'INCOME').forEach(t => {
          totalIncome += t.amount; incomeBySource[t.source] = (incomeBySource[t.source] || 0) + t.amount;
        });

        let totalExpense = 0; const expenseByCat = {};
        let needs = 0; let wants = 0; let investments = 0;

        monthExp.forEach(e => {
          totalExpense += e.amount; 
          expenseByCat[e.category] = (expenseByCat[e.category] || 0) + e.amount;
          if (e.type === 'NEED') needs += e.amount;
          if (e.type === 'WANT') wants += e.amount;
          if (e.type === 'INVESTMENT') investments += e.amount;
        });

        const needsLimit = totalIncome * 0.50;
        const wantsLimit = totalIncome * 0.30;
        const investLimit = totalIncome * 0.20;

        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#0ea5e9', '#f97316', '#d946ef', '#eab308'];
        
        const incomeData = Object.entries(incomeBySource).map(([label, value], i) => ({ label, value, color: colors[i % colors.length] })).sort((a,b) => b.value - a.value);
        const expenseData = Object.entries(expenseByCat).map(([label, value], i) => ({ label, value, color: colors[(i+3) % colors.length] })).sort((a,b) => b.value - a.value);

        return { 
          totalIncome, totalExpense, remaining: totalIncome - totalExpense, 
          incomeData, expenseData, monthExp,
          needs, wants, investments, needsLimit, wantsLimit, investLimit,
          needsPct: totalIncome > 0 ? Math.min((needs / needsLimit) * 100, 100) : 0, 
          wantsPct: totalIncome > 0 ? Math.min((wants / wantsLimit) * 100, 100) : 0, 
          investPct: totalIncome > 0 ? Math.min((investments / investLimit) * 100, 100) : 0
        };
      }, [transactions, expenses, selectedMonth]);

      const availableCash = transactionStats.netCashFlow - portfolioStats.totalInvested - expenses.reduce((sum, e) => sum + e.amount, 0);
      const totalNetWorth = portfolioStats.totalCurrent + availableCash - liabilityStats.totalRemaining;

      // Safe Month Parsing for Mobile
      const getDisplayMonthName = (YYYY_MM) => {
        if (!YYYY_MM) return "";
        const [year, month] = YYYY_MM.split('-');
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${monthNames[parseInt(month, 10) - 1]} ${year}`;
      };

      // --- CRUD ---
      const handleSaveExpense = async () => {
        try {
          if (!user || !newExpense.amount || !newExpense.category) return alert("Fill amount and category.");
          const expId = editingExpenseId || Date.now().toString();
          await getUserPath(user.uid, 'daily_expenses').doc(expId).set({ id: expId, type: newExpense.type, category: newExpense.category, amount: parseFloat(newExpense.amount), date: newExpense.date, note: newExpense.note });
          setIsExpenseModalOpen(false);
        } catch (error) { alert(error.message); }
      };

      const handleSaveAsset = async () => {
        try {
          if (!user || !newAsset.name || !newAsset.invested) return alert("Fill Name and Invested fields.");
          const assetId = editingAssetId || Date.now().toString();
          await getUserPath(user.uid, 'holdings').doc(assetId).set({ id: assetId, category: newAsset.category, name: newAsset.name, invested: parseFloat(newAsset.invested), current: formCalculations.currentValue, currentPrice: parseFloat(newAsset.currentPrice) || 0, quantity: formCalculations.quantity, buyPrice: parseFloat(newAsset.buyPrice) || 0, date: newAsset.date, yieldEarned: editingAssetId ? (holdings.find(h=>h.id===editingAssetId)?.yieldEarned || 0) : 0 });
          setIsAddModalOpen(false);
        } catch (error) { alert(error.message); }
      };

      const handleSaveTransaction = async () => {
        try {
          if (!user || !newTransaction.amount) return alert("Enter Amount.");
          let finalSource = newTransaction.source;
          if (newTransaction.type === 'INCOME' && newTransaction.source === 'NEW_SOURCE') {
            finalSource = newTransaction.customSource;
            if(!finalSource) return alert("Enter source name");
            if (!incomeSources.includes(finalSource)) await db.collection('artifacts').doc(PROJECT_APP_ID).collection('users').doc(user.uid).collection('settings').doc('profile').set({ incomeSources: [...incomeSources, finalSource] }, { merge: true });
          } else if (newTransaction.type === 'WITHDRAWAL') finalSource = newTransaction.customSource || 'Expense/Transfer';

          const txId = editingTransactionId || Date.now().toString();

          await getUserPath(user.uid, 'liabilities').doc(libId).set({ id: libId, category: newLiability.category, name: newLiability.name, totalAmount: parseFloat(newLiability.totalAmount), paidAmount: parseFloat(newLiability.paidAmount) || 0, monthlyEmi: parseFloat(newLiability.monthlyEmi) || 0, date: newLiability.date });

      const handleLogYield = async () => {
        try {
          if (!user || !yieldData.amount) return alert("Enter amount.");
          const amt = parseFloat(yieldData.amount);
          const assetToUpdate = holdings.find(a => a.id === yieldData.assetId);
          await getUserPath(user.uid, 'holdings').doc(yieldData.assetId.toString()).set({ ...assetToUpdate, yieldEarned: (assetToUpdate.yieldEarned || 0) + amt });
          await getUserPath(user.uid, 'transactions').doc(Date.now().toString()).set({ id: Date.now().toString(), type: 'INCOME', source: `Yield: ${yieldData.assetName}`, amount: amt, date: yieldData.date });
          setIsYieldModalOpen(false);
        } catch (error) { alert(error.message); }
      };

      const handlePayEmi = async () => {
        try {
          if (!user || !emiData.amount) return alert("Enter amount.");
          const amt = parseFloat(emiData.amount);
          const libToUpdate = liabilities.find(l => l.id === emiData.liabilityId);
          await getUserPath(user.uid, 'liabilities').doc(emiData.liabilityId.toString()).set({ ...libToUpdate, paidAmount: libToUpdate.paidAmount + amt });
          await getUserPath(user.uid, 'daily_expenses').doc(Date.now().toString()).set({ id: Date.now().toString(), type: 'NEED', category: 'Debt EMI', note: `EMI: ${emiData.name}`, amount: amt, date: emiData.date });
          setIsPayEmiModalOpen(false);
        } catch (error) { alert(error.message); }
      };

      const executeSell = async (cashOut) => {
        try {
          const asset = sellModalData;
          const realizedPnl = asset.computedCurrent - asset.invested;
          if (realizedPnl !== 0) await getUserPath(user.uid, 'transactions').doc(Date.now().toString()).set({ id: Date.now().toString(), type: 'INCOME', source: `Sale PnL: ${asset.name}`, amount: realizedPnl, date: getTodayDate() });
          if (cashOut) await getUserPath(user.uid, 'transactions').doc((Date.now() + 1).toString()).set({ id: (Date.now() + 1).toString(), type: 'WITHDRAWAL', source: `Cashed Out: ${asset.name}`, amount: asset.computedCurrent, date: getTodayDate() });

          setSellModalData(null);

      const toggleCategory = (categoryKey) => setExpandedCategories(prev => ({ ...prev, [categoryKey]: !prev[categoryKey] }));
      const toggleAssetExpansion = (assetKey) => setExpandedAssets(prev => ({ ...prev, [assetKey]: !prev[assetKey] }));

      const handleAddMore = (category, name) => { setNewAsset({ category, name, invested: '', buyPrice: '', currentPrice: '', manualCurrentValue: '', date: getTodayDate() }); setEditingAssetId(null); setIsAddModalOpen(true); };
      const openEditAsset = (asset) => { setEditingAssetId(asset.id); setNewAsset({ category: asset.category, name: asset.name, invested: asset.invested.toString(), buyPrice: asset.buyPrice ? asset.buyPrice.toString() : '', currentPrice: asset.currentPrice ? asset.currentPrice.toString() : '', manualCurrentValue: asset.current.toString(), date: asset.date || getTodayDate() }); setIsAddModalOpen(true); };
      const openEditLiability = (liability) => { setEditingLiabilityId(liability.id); setNewLiability({ category: liability.category, name: liability.name, totalAmount: liability.totalAmount.toString(), paidAmount: liability.paidAmount.toString(), monthlyEmi: liability.monthlyEmi.toString(), date: liability.date || getTodayDate() }); setIsLiabilityModalOpen(true); };

                            </div>
                          </div>

                    <h2 className="text-base font-bold text-slate-100 mb-4 border-b border-slate-800 pb-3"><Icon name="fa-chart-pie" className="mr-2 text-emerald-400"/> Asset Allocation</h2>
                    {portfolioStats.allocation.length > 0 && (

                    <div className="space-y-3">
                      {portfolioStats.allocation.map(alloc => (
                        <div key={alloc.key} className="flex justify-between items-center bg-slate-950/50 p-3 rounded-xl border border-slate-800/50">
                          <div className="flex items-center w-1/3">

                          <div className="text-right w-1/3"><p className="text-[10px] text-slate-500 uppercase font-bold">Current</p><p className="text-sm font-bold text-white">{formatINR(alloc.current)}</p></div>
                        </div>
                      ))}

                  {/* Cash Flow Logs */}
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 md:p-6 flex flex-col h-[400px] lg:h-auto lg:max-h-[600px]">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-3 shrink-0">
                      <h2 className="text-base font-bold text-blue-400"><Icon name="fa-money-bill-wave" className="mr-2"/> Transactions / Flow</h2>
                      <button onClick={() => { setEditingTransactionId(null); setIsTransactionModalOpen(true); }} className="text-slate-400 hover:text-white text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-lg">+ Add</button>

                    <div className="sm:col-span-2"><label className="block text-xs text-slate-400 mb-1.5">Loan Name</label><input type="text" value={newLiability.name} onChange={e => setNewLiability({...newLiability, name: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/></div>
                    <div><label className="block text-xs text-slate-400 mb-1.5">Total Borrowed (₹)</label><input type="number" step="any" value={newLiability.totalAmount} onChange={e => setNewLiability({...newLiability, totalAmount: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/></div>
                    <div><label className="block text-xs text-slate-400 mb-1.5">Already Paid (₹)</label><input type="number" step="any" value={newLiability.paidAmount} onChange={e => setNewLiability({...newLiability, paidAmount: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/></div>
                    <div><label className="block text-xs text-slate-400 mb-1.5">Monthly EMI (₹)</label><input type="number" step="any" value={newLiability.monthlyEmi} onChange={e => setNewLiability({...newLiability, monthlyEmi: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/></div>
                    <div><label className="block text-xs text-slate-400 mb-1.5">Loan Start Date</label><input type="date" value={newLiability.date} onChange={e => setNewLiability({...newLiability, date: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white [color-scheme:dark]" /></div>
                  </div>
                  <button type="button" onClick={handleSaveLiability} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3.5 rounded-xl">Save Debt</button>
                </div>
              </div>
            </div>
          )}

          {/* EMI Modal */}
          {isPayEmiModalOpen && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl p-5">
                <div className="flex justify-between items-center mb-5 border-b border-slate-800 pb-3"><h3 className="text-lg font-bold text-white">Log EMI Payment</h3><button onClick={() => setIsPayEmiModalOpen(false)} className="text-slate-400"><Icon name="fa-xmark" size={20}/></button></div>
                <div className="space-y-4">
                  <div className="bg-slate-950/50 border border-slate-800 p-4 rounded-xl text-sm text-slate-300 text-center">Paying EMI for: <strong className="text-emerald-400 text-lg block mt-1">{emiData.name}</strong></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-xs text-slate-400 mb-1.5">Amount Paid (₹)</label><input type="number" step="any" value={emiData.amount} onChange={e => setEmiData({...emiData, amount: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/></div>
                    <div><label className="block text-xs text-slate-400 mb-1.5">Date</label><input type="date" value={emiData.date} onChange={e => setEmiData({...emiData, date: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white [color-scheme:dark]" /></div>
                  </div>
                  <button type="button" onClick={handlePayEmi} className="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl">Log EMI</button>
                </div>
              </div>
            </div>
          )}

          {/* Sell Modal */}
          {sellModalData && (
            <div className="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl">
                <div className="p-6 text-center border-b border-slate-800">
                  <div className="w-16 h-16 bg-rose-500/10 text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="fa-right-from-bracket" size={32} /></div>
                  <h3 className="text-xl font-black text-white mb-2">Sell Asset Lot</h3>
                  <p className="text-slate-400 text-sm">You are closing your position on <strong className="text-slate-200">{sellModalData.name}</strong>.</p>
                </div>
                <div className="p-5 space-y-3 bg-slate-900">
                  <p className="text-xs text-slate-500 font-medium uppercase tracking-wider text-center mb-4">Where is the money going?</p>
                  <button onClick={() => executeSell(false)} className="w-full flex items-center justify-between p-4 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 rounded-xl text-left"><div className="flex items-center"><Icon name="fa-download" className="text-emerald-400 mr-3" size={20} /><div><h4 className="text-emerald-400 font-bold text-sm">Keep in Portfolio</h4><p className="text-[10px] sm:text-xs text-emerald-500/70 mt-0.5">Moves funds to Available Cash</p></div></div></button>
                  <button onClick={() => executeSell(true)} className="w-full flex items-center justify-between p-4 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-xl text-left"><div className="flex items-center"><Icon name="fa-right-from-bracket" className="text-rose-400 mr-3" size={20} /><div><h4 className="text-rose-400 font-bold text-sm">Withdraw / Cash Out</h4><p className="text-[10px] sm:text-xs text-rose-500/70 mt-0.5">Removes funds to your Bank</p></div></div></button>
                  <button onClick={() => setSellModalData(null)} className="w-full py-3 text-slate-400 hover:text-white text-sm font-medium mt-2">Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* Yield Modal */}
          {isYieldModalOpen && (
             <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl p-5">
                <div className="flex justify-between items-center mb-5 border-b border-slate-800 pb-3"><h3 className="text-lg font-bold text-white">Log Yield</h3><button onClick={() => setIsYieldModalOpen(false)} className="text-slate-400"><Icon name="fa-xmark" size={20}/></button></div>
                <div className="space-y-4">
                  <div className="bg-indigo-950/30 text-indigo-200 text-center p-4 rounded-xl text-sm">Income for: <strong className="text-indigo-400 text-lg block">{yieldData.assetName}</strong></div>
                  <div className="grid grid-cols-2 gap-4">
                    <input type="number" step="any" value={yieldData.amount} onChange={e => setYieldData({...yieldData, amount: e.target.value})} placeholder="Amount" className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white"/>
                    <input type="date" value={yieldData.date} onChange={e => setYieldData({...yieldData, date: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white [color-scheme:dark]" />
                  </div>
                  <button type="button" onClick={handleLogYield} className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl">Save</button>
                </div>
              </div>
            </div>
          )}

          {/* Settings Modal */}
          {isSettingsModalOpen && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl p-5">
                <div className="flex justify-between items-center mb-5 border-b border-slate-800 pb-3"><h3 className="text-lg font-bold text-white"><Icon name="fa-gear" className="mr-2 text-slate-400"/> Settings</h3><button onClick={() => setIsSettingsModalOpen(false)} className="text-slate-400"><Icon name="fa-xmark" size={20}/></button></div>
                <div className="space-y-4">
                  <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <p className="text-sm text-slate-300 font-bold mb-3">App Lock PIN</p>
                    {customPassword && (<input type="password" placeholder="Current PIN" value={passwordChangeData.current} onChange={e => setPasswordChangeData({...passwordChangeData, current: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-center tracking-[0.5em] mb-2"/>)}
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      <input type="password" placeholder="New PIN" value={passwordChangeData.new} onChange={e => setPasswordChangeData({...passwordChangeData, new: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-center tracking-[0.5em]"/>
                      <input type="password" placeholder="Confirm" value={passwordChangeData.confirm} onChange={e => setPasswordChangeData({...passwordChangeData, confirm: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-center tracking-[0.5em]"/>
                    </div>
                    <button type="button" onClick={handleSetOrChangePassword} className="w-full bg-slate-800 text-white font-bold py-2 rounded-lg hover:bg-slate-700">Update PIN</button>
                  </div>
                  <button onClick={() => auth.signOut()} className="w-full bg-rose-600/10 text-rose-400 font-bold py-3 rounded-xl border border-rose-500/20">Log Out</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err)); });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
